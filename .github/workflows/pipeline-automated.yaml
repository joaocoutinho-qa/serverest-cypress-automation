name: Automated Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # 1. Project Setup Job (Prepares environment and caches dependencies)
  project-setup:
    runs-on: ubuntu-latest
    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Configure node js with cache
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm' # Enables automatic caching of global npm dependencies

      - name: Install dependencies
        run: npm install

  # 2. Parallel Job for API Tests
  api-tests:
    runs-on: ubuntu-latest
    needs: project-setup
    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Configure node js with cache
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies from cache
        run: npm ci # Faster install that uses cached dependencies safely

      - name: Clean report directory
        run: npm run clean:report || true

      - name: API Test Execution
        run: npx cypress run --spec "cypress/e2e/api/**/*.cy.js" --reporter mochawesome --reporter-options reportDir=cypress/report,overwrite=false,html=false,json=true,reportFilename=api-result
        continue-on-error: true

      - name: Upload API JSON Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: api-json-results
          path: cypress/report/

  # 3. Parallel Job for Frontend Tests
  frontend-tests:
    runs-on: ubuntu-latest
    needs: project-setup
    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Configure node js with cache
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies from cache
        run: npm ci

      - name: Clean report directory
        run: npm run clean:report || true

      - name: Frontend Test Execution
        run: npx cypress run --spec "cypress/e2e/front/**/*.cy.js" --reporter mochawesome --reporter-options reportDir=cypress/report,overwrite=false,html=false,json=true,reportFilename=front-result
        continue-on-error: true

      - name: Upload Frontend JSON Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-json-results
          path: cypress/report/

  # 4. Finalization Job
  generate-final-report:
    runs-on: ubuntu-latest
    needs: [api-tests, frontend-tests]
    if: always()

    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Configure node js with cache
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies from cache
        run: npm ci

      - name: Create Clean Report Directory
        run: |
          npm run clean:report || true
          mkdir -p cypress/report

      - name: Download API Artifacts
        uses: actions/download-artifact@v4
        with:
          name: api-json-results
          path: cypress/report

      - name: Download Frontend Artifacts
        uses: actions/download-artifact@v4
        with:
          name: frontend-json-results
          path: cypress/report

      - name: Merge and Generate HTML Report
        run: |
          npm run report:merge
          npm run report:gen

      - name: Upload Final Consolidated Report
        uses: actions/upload-artifact@v4
        with:
          name: Serverest-Consolidated-Test-Report
          path: cypress/report/